<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Media Player</title>
    <style>
        body {
    background-color: #0f0f0f;
    color: white;
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    overflow: hidden; /* ドラッグ移動中にスクロールさせないため */
}

/* プレイヤー外枠：ドラッグ可能 */
.player-wrapper {
    position: absolute;
    top: 50px;
    left: 50px;
    width: 720px;
    background: #000;
    border-radius: 12px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    overflow: hidden;
    cursor: grab;
    z-index: 100;
}
.player-wrapper:active { cursor: grabbing; }

video { width: 100%; display: block; pointer-events: none; }

/* 操作パネル */
.video-overlay {
    position: absolute;
    bottom: 0;
    width: 100%;
    background: linear-gradient(transparent, rgba(0,0,0,0.95));
    padding: 15px 20px;
    box-sizing: border-box;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: auto; /* ここだけはクリック可能にする */
}
.player-wrapper:hover .video-overlay { opacity: 1; }

.controls { display: flex; justify-content: space-between; align-items: center; }
.left-group, .right-group { display: flex; align-items: center; gap: 15px; }

.icon-btn {
    background: none; border: none; color: white;
    font-size: 20px; cursor: pointer; transition: 0.2s;
}
.icon-btn:hover { color: #e50914; transform: scale(1.1); }

.seek-bar { width: 100%; accent-color: #e50914; cursor: pointer; margin-bottom: 10px; }
.volume-bar { width: 80px; accent-color: #fff; }

/* プレイリスト（右側に固定） */
.playlist-container {
    position: fixed;
    right: 20px;
    top: 20px;
    width: 280px;
    background: #1a1a1a;
    border-radius: 10px;
    padding: 15px;
    max-height: 80vh;
    overflow-y: auto;
}
#playlist li {
    padding: 10px; border-bottom: 1px solid #333; cursor: pointer; font-size: 13px;
}
#playlist li.active { color: #e50914; border-left: 3px solid #e50914; background: #252525; }

.drop-guide {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    color: #444; font-weight: bold; pointer-events: none;
}
    </style>
</head>
<body>

<div class="app-container">
    <div class="player-wrapper" id="playerContainer">
        <video id="myVideo" src=""></video>
        
        <div class="video-overlay">
            <input type="range" id="seekBar" class="seek-bar" value="0" step="0.1">
            
            <div class="controls">
                <div class="left-group">
                    <button id="rewind1m" class="icon-btn">-1m</button>
                    <button id="rewind10s" class="icon-btn">⏪</button>
                    <button id="playBtn" class="icon-btn">▶</button>
                    <button id="forward10s" class="icon-btn">⏩</button>
                    <button id="forward1m" class="icon-btn">+1m</button>
                    
                    <div class="time-display">
                        <span id="current-time">00:00</span> / <span id="duration-time">00:00</span>
                    </div>
                </div>
                
                <div class="right-group">
                    <button id="muteBtn" class="icon-btn">🔊</button>
                    <input type="range" id="volumeBar" class="volume-bar" min="0" max="1" step="0.05" value="1">
                    <button id="fullscreenBtn" class="icon-btn">⛶</button>
                </div>
            </div>
        </div>
        <div id="dropGuide" class="drop-guide">ファイルをドロップして再生</div>
    </div>

    <div class="playlist-container">
        <h3>Playlist</h3>
        <ul id="playlist"></ul>
        <p style="font-size: 10px; color: #666; margin-top: 10px;">※ファイルをドロップして追加</p>
    </div>
</div>

<script>
    const video = document.getElementById('myVideo');
const playBtn = document.getElementById('playBtn');
const seekBar = document.getElementById('seekBar');
const currentTimeEl = document.getElementById('current-time');
const durationTimeEl = document.getElementById('duration-time');
const muteBtn = document.getElementById('muteBtn');
const volumeBar = document.getElementById('volumeBar');
const fullscreenBtn = document.getElementById('fullscreenBtn');
const playerContainer = document.getElementById('playerContainer');
const playlistEl = document.getElementById('playlist');
const dropGuide = document.getElementById('dropGuide');

let songs = []; // ユーザーが追加したファイル用
let currentIndex = 0;

// --- 再生ロジック ---
function togglePlay() {
    if (!video.src) return;
    if (video.paused) { video.play(); playBtn.textContent = 'Ⅱ'; }
    else { video.pause(); playBtn.textContent = '▶'; }
}

function loadSong(index) {
    if (!songs[index]) return;
    currentIndex = index;
    video.src = songs[index].src;
    dropGuide.style.display = 'none';
    video.load();
    video.play();
    playBtn.textContent = 'Ⅱ';
    renderPlaylist();
}

function renderPlaylist() {
    playlistEl.innerHTML = songs.map((s, i) => 
        `<li class="${i === currentIndex ? 'active' : ''}" onclick="loadSong(${i})">${s.title}</li>`
    ).join('');
}

function skip(seconds) {
    video.currentTime = Math.max(0, Math.min(video.duration, video.currentTime + seconds));
}

// --- イベントリスナー ---
playBtn.onclick = togglePlay;
video.ontimeupdate = () => {
    seekBar.value = video.currentTime;
    currentTimeEl.textContent = formatTime(video.currentTime);
};
video.onloadedmetadata = () => {
    seekBar.max = video.duration;
    durationTimeEl.textContent = formatTime(video.duration);
};
seekBar.oninput = () => video.currentTime = seekBar.value;
muteBtn.onclick = () => { video.muted = !video.muted; muteBtn.textContent = video.muted ? '🔇' : '🔊'; };
volumeBar.oninput = () => { video.volume = volumeBar.value; video.muted = false; };
fullscreenBtn.onclick = () => document.fullscreenElement ? document.exitFullscreen() : playerContainer.requestFullscreen();
video.onended = () => loadSong((currentIndex + 1) % songs.length);

function formatTime(s) {
    const min = Math.floor(s / 60);
    const sec = Math.floor(s % 60);
    return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
}

// --- ドラッグ＆ドロップ機能 ---
playerContainer.ondragover = (e) => { e.preventDefault(); playerContainer.style.boxShadow = "0 0 20px #e50914"; };
playerContainer.ondragleave = () => playerContainer.style.boxShadow = "none";
playerContainer.ondrop = (e) => {
    e.preventDefault();
    playerContainer.style.boxShadow = "none";
    const files = Array.from(e.dataTransfer.files);
    files.forEach(file => {
        if (file.type.startsWith('video/') || file.type.startsWith('audio/')) {
            songs.push({ title: file.name, src: URL.createObjectURL(file) });
        }
    });
    if (songs.length > 0 && !video.src) loadSong(0);
    renderPlaylist();
};

// --- ウィンドウ移動（ドラッグ）機能 ---
let isDragging = false, offsetX, offsetY;
playerContainer.onmousedown = (e) => {
    if (e.target.closest('.video-overlay')) return;
    isDragging = true;
    offsetX = e.clientX - playerContainer.offsetLeft;
    offsetY = e.clientY - playerContainer.offsetTop;
};
window.onmousemove = (e) => {
    if (!isDragging) return;
    playerContainer.style.left = (e.clientX - offsetX) + 'px';
    playerContainer.style.top = (e.clientY - offsetY) + 'px';
};
window.onmouseup = () => isDragging = false;

// --- キーボード操作 ---
window.onkeydown = (e) => {
    if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
    if (e.code === 'ArrowRight') skip(10);
    if (e.code === 'ArrowLeft') skip(-10);
};

// ボタン類のスキップ登録
document.getElementById('rewind10s').onclick = () => skip(-10);
document.getElementById('forward10s').onclick = () => skip(10);
document.getElementById('rewind1m').onclick = () => skip(-60);
document.getElementById('forward1m').onclick = () => skip(60);
</script>
</body>
</html>
